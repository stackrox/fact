name: License checks

on:
  push:
    branches:
    - main
    - release-*
    - konflux/**
  pull_request:

jobs:
  licenses-need-reevaluation:
    name: 'Should licenses be evaluated ?'
    runs-on: 'ubuntu-24.04'
    outputs:
      need-reevaluation: ${{ steps.set-output.outputs.need-reevaluation || 'false' }}

    steps:
    - uses: actions/checkout@v4

    - uses: dorny/paths-filter@v3
      id: changed
      with:
        filters: |
          lockfile:
          - Cargo.lock

    - id: set-output
      if: steps.changed.outputs.lockfile
      run: |
        echo "need-reevaluation=true" >> "$GITHUB_OUTPUT"

  check:
    needs:
    - licenses-need-reevaluation
    if: needs.licenses-need-reevaluation.outputs.need-reevaluation == 'true'
    runs-on: 'ubuntu-24.04'

    steps:
    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: check-license-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-about
      run: cargo install cargo-about

    - name: Generate licenses
      run: make licenses

    - name: Store licenses
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: third-party-licenses
        path: |
          ${{ github.workspace }}/THIRD_PARTY_LICENSES.html
